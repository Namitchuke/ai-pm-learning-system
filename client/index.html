<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PM Learning System — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* --- ANIMATED BACKGROUND --- */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .15;
            animation: float 18s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #34D399, transparent 70%);
            top: -80px;
            left: -100px;
            animation-duration: 22s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #60A5FA, transparent 70%);
            bottom: -60px;
            right: -80px;
            animation-duration: 18s;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #a78bfa, transparent 70%);
            top: 40%;
            left: 60%;
            animation-duration: 24s;
            animation-delay: -8s;
            opacity: .2;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -40px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 30px) scale(.95);
            }

            75% {
                transform: translate(40px, 20px) scale(1.08);
            }

            100% {
                transform: translate(-30px, -30px) scale(1);
            }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: sparkle 6s ease-in-out infinite;
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }

            50% {
                opacity: .6;
                transform: translateY(-60px) scale(1);
            }
        }

        /* Grid lines bg */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image:
                linear-gradient(rgba(31, 41, 55, .4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(31, 41, 55, .4) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 70%);
        }

        /* --- AUTH CARD --- */
        .auth-card {
            background: #111827;
            border: 1px solid #1F2937;
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .4);
            animation: cardEntry .7s cubic-bezier(.4, 0, .2, 1);
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(20px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .auth-logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--grad);
            margin-bottom: 14px;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .auth-logo-icon svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(52, 211, 153, .15);
            }

            50% {
                box-shadow: 0 0 25px rgba(52, 211, 153, .3);
            }
        }

        .auth-logo h1 {
            font-size: 24px;
            font-weight: 900;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo p {
            font-size: 13px;
            color: var(--t3);
            margin-top: 4px;
        }

        .auth-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg3);
            padding: 4px;
            border-radius: 10px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--t3);
            cursor: pointer;
            border-radius: 8px;
            transition: all .25s;
        }

        .auth-tab.active {
            background: var(--grad);
            color: #fff;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--t1);
            padding: 10px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            margin-top: 8px;
        }

        .auth-btn.primary {
            background: var(--grad);
            color: #fff;
        }

        .auth-btn.primary:hover {
            opacity: .9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .3);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 11px;
            color: var(--t4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--t1);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all .2s;
        }

        .google-btn:hover {
            border-color: var(--accent);
            background: var(--bg2);
            transform: translateY(-1px);
        }

        .google-btn svg {
            width: 18px;
            height: 18px;
        }

        .auth-error {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .2);
            color: var(--red);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 14px;
            display: none;
        }

        .auth-error.show {
            display: block;
        }

        #signupForm {
            display: none;
        }

        /* Feature highlights */
        .auth-features {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .auth-feat {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(31, 41, 55, .6);
            border: 1px solid #374151;
            color: var(--t2);
            font-weight: 500;
            animation: feat-in .5s ease backwards;
        }

        .auth-feat:nth-child(1) {
            animation-delay: .4s;
        }

        .auth-feat:nth-child(2) {
            animation-delay: .5s;
        }

        .auth-feat:nth-child(3) {
            animation-delay: .6s;
        }

        .auth-feat:nth-child(4) {
            animation-delay: .7s;
        }

        @keyframes feat-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <h1>AI PM Learning System</h1>
                <p>Master AI Product Management in 24 weeks</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="showAuthTab('login')">Login</div>
                <div class="auth-tab" onclick="showAuthTab('signup')">Sign Up</div>
            </div>

            <div id="authError" class="auth-error"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn primary">Login</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" placeholder="johndoe" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Study Role</label>
                    <select id="signupRole">
                        <option value="AI PM" selected>AI Product Manager</option>
                    </select>
                </div>
                <button type="submit" class="auth-btn primary">Create Account</button>
            </form>

            <div class="auth-divider">or continue with</div>

            <button class="google-btn" onclick="googleLogin()">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Continue with Google
            </button>

            <div class="auth-features">
                <span class="auth-feat">📚 24-Week Roadmap</span>
                <span class="auth-feat">🎙️ 80+ Mock Interviews</span>
                <span class="auth-feat">🧠 100+ Case Studies</span>
                <span class="auth-feat">📊 Skill Tracker</span>
            </div>
        </div>
    </div>

    <script>
        // Generate floating particles
        (function () {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = (Math.random() * 6) + 's';
                p.style.animationDuration = (4 + Math.random() * 4) + 's';
                p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
                container.appendChild(p);
            }
        })();

        // Check if already logged in
        fetch('/auth/me').then(r => r.json()).then(d => {
            if (d.user) window.location.href = '/dashboard.html';
        }).catch(() => { });

        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)));
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
            hideError();
        }

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.add('show');
        }
        function hideError() { document.getElementById('authError').classList.remove('show'); }

        async function handleLogin(e) {
            e.preventDefault();
            hideError();
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/dashboard.html';
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            hideError();
            try {
                const res = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('signupName').value,
                        username: document.getElementById('signupUsername').value,
                        email: document.getElementById('signupEmail').value,
                        password: document.getElementById('signupPassword').value,
                        studyRole: document.getElementById('signupRole').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/dashboard.html';
                } else {
                    showError(data.error || 'Signup failed');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            }
        }

        function googleLogin() {
            window.location.href = '/auth/google';
        }
    </script>
</body>

</html>
